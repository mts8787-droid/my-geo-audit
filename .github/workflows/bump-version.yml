name: Auto Bump Version

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version by 0.1
        run: |
          # Extract current version from index.html
          CURRENT=$(grep -oP 'Build \K[0-9]+\.[0-9]+' static/index.html | head -1)
          echo "Current version: $CURRENT"

          # Calculate new version (increment minor by 1)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          echo "New version: $NEW_VERSION"

          # Update static/index.html
          sed -i "s|>v${CURRENT}<|>v${NEW_VERSION}<|g" static/index.html
          sed -i "s|Build ${CURRENT}|Build ${NEW_VERSION}|g" static/index.html

          # Update main.py FastAPI version
          sed -i "s|version=\"[0-9]*\.[0-9]*\.[0-9]*\"|version=\"${NEW_VERSION}.0\"|g" main.py

          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/index.html main.py
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Bump version to v${VERSION}"
          git push
