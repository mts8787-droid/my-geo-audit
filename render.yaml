services:
  - type: web
    name: geo-audit
    env: python
    buildCommand: bash build.sh
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: https://geo-audit.onrender.com,https://geoaudit.dev
