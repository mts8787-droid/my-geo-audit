<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEO Audit — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .gradient-text { background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: #fff; border-radius: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); border: 1px solid #e2e8f0; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .proportion-seg { transition: width 0.4s ease; min-width: 2px; }
    .toggle-track { transition: background-color 0.2s; }
    .toggle-thumb { transition: transform 0.2s; }
    input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #e2e8f0; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #6366f1; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .criteria-row:hover { background-color: #f8fafc; }
    .rule-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; }
    .sidebar { width: 240px; min-width: 240px; }
    .nav-item { transition: all 0.15s; }
    .nav-item.active { background: linear-gradient(135deg, #eef2ff, #f5f3ff); color: #4f46e5; border-right: 3px solid #6366f1; }
    .nav-item:not(.active):hover { background: #f8fafc; }
    @media (max-width: 768px) { .sidebar { width: 56px; min-width: 56px; } .sidebar .nav-label { display: none; } .sidebar .nav-icon { margin: 0 auto; } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Login Screen -->
  <div id="login-screen" class="max-w-sm mx-auto px-6 mt-32">
    <div class="card p-8 text-center fade-in">
      <div class="text-3xl mb-3">🔐</div>
      <h2 class="text-lg font-bold text-slate-800 mb-1">관리자 인증</h2>
      <p class="text-sm text-slate-400 mb-6">채점 설정을 관리하려면 비밀번호를 입력하세요.</p>
      <input id="pw-input" type="password" placeholder="비밀번호"
        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-400 focus:outline-none text-sm mb-3"
        onkeydown="if(event.key==='Enter') doLogin()">
      <button onclick="doLogin()"
        class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-xl hover:opacity-90 transition text-sm">
        로그인
      </button>
      <p id="login-error" class="text-red-500 text-xs mt-3 hidden"></p>
    </div>
  </div>

  <!-- Main Layout (sidebar + content) -->
  <div id="main-layout" class="h-screen flex-col" style="display:none">

    <!-- Top Header -->
    <header class="bg-white border-b border-slate-100 flex-shrink-0 z-40">
      <div class="px-6 py-3 flex items-center gap-3">
        <a href="/" class="text-xl font-extrabold gradient-text">GEO Audit</a>
        <span class="text-xs font-medium bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">Admin</span>
        <div class="flex-1"></div>
        <button class="text-xs text-slate-400 hover:text-slate-600" onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">

      <!-- Sidebar -->
      <nav class="sidebar bg-white border-r border-slate-100 flex-shrink-0 py-4 flex flex-col">
        <div class="flex-1 space-y-1 px-3">
          <button onclick="switchPage('criteria')" id="nav-criteria"
            class="nav-item active w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left text-sm font-medium text-slate-600">
            <svg class="nav-icon w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span class="nav-label">Audit 기준 설정</span>
          </button>
          <button onclick="switchPage('list')" id="nav-list"
            class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left text-sm font-medium text-slate-600">
            <svg class="nav-icon w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
            </svg>
            <span class="nav-label">Audit List 관리</span>
          </button>
          <button onclick="switchPage('schedule')" id="nav-schedule"
            class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-left text-sm font-medium text-slate-600">
            <svg class="nav-icon w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="nav-label">정기 Audit 관리</span>
          </button>
        </div>
        <div class="px-3 pt-3 border-t border-slate-100">
          <a href="/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-xs text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition">
            <svg class="nav-icon w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            <span class="nav-label">사이트로 돌아가기</span>
          </a>
        </div>
      </nav>

      <!-- Content Area -->
      <main class="flex-1 overflow-y-auto">

        <!-- Page 1: Audit 기준 설정 -->
        <div id="page-criteria" class="max-w-5xl mx-auto px-6 py-8">
          <h1 class="text-xl font-bold text-slate-800 mb-6">Audit 기준 설정</h1>

          <div class="card p-6 mb-6 fade-in">
            <div class="flex items-center justify-between mb-2">
              <h2 class="text-base font-bold text-slate-800">배점 분포</h2>
              <div class="flex items-center gap-3">
                <span id="total-badge" class="text-2xl font-extrabold gradient-text">100점</span>
                <button onclick="autoBalance()" class="text-xs px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition font-medium">자동 맞춤</button>
              </div>
            </div>
            <div id="proportion-bar" class="flex rounded-lg overflow-hidden h-8 mb-3"></div>
            <div id="proportion-legend" class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-500"></div>
            <p id="total-warning" class="text-amber-600 text-xs mt-2 hidden"></p>
          </div>

          <div id="config-cards" class="space-y-4 mb-6"></div>

          <div class="card p-6 mb-6 fade-in">
            <h3 class="text-sm font-bold text-slate-700 mb-4">등급 기준</h3>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="text-xs text-slate-500 mb-1 block">Good (이상)</label>
                <input id="grade-good" type="number" min="0" max="200"
                  class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none" oninput="markDirty()">
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">Need Improvement (이상)</label>
                <input id="grade-need" type="number" min="0" max="200"
                  class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none" oninput="markDirty()">
              </div>
            </div>
          </div>

          <div class="flex gap-3 mb-10">
            <button id="btn-save" onclick="saveConfig()"
              class="flex-1 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-xl hover:opacity-90 transition text-sm disabled:opacity-40" disabled>저장</button>
            <button onclick="resetConfig()"
              class="px-6 py-3 bg-slate-100 text-slate-600 font-semibold rounded-xl hover:bg-slate-200 transition text-sm">기본값으로 리셋</button>
          </div>
        </div>

        <!-- Page 2: Audit List 관리 (그룹 기반) -->
        <div id="page-list" class="max-w-5xl mx-auto px-6 py-8 hidden">
          <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-bold text-slate-800">Audit List 관리</h1>
            <button onclick="openAddGroupModal()" class="px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-sm font-semibold rounded-xl hover:opacity-90 transition">
              + 그룹 추가
            </button>
          </div>
          <div id="groups-container" class="space-y-4"></div>
        </div>

        <!-- Page 3: 정기 Audit 관리 -->
        <div id="page-schedule" class="max-w-5xl mx-auto px-6 py-8 hidden">
          <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-bold text-slate-800">정기 Audit 관리</h1>
            <button onclick="openAddScheduleModal()" class="px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-sm font-semibold rounded-xl hover:opacity-90 transition">
              + 스케줄 추가
            </button>
          </div>
          <div id="schedule-list" class="space-y-4 mb-6"></div>
          <div class="card p-6 fade-in">
            <h3 class="text-sm font-bold text-slate-700 mb-3">스케줄 설정 안내</h3>
            <div class="space-y-2 text-xs text-slate-500">
              <div class="flex items-start gap-2"><span class="w-5 h-5 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center flex-shrink-0 text-[10px] font-bold mt-0.5">1</span><p>Audit List에서 URL 그룹을 만들고 URL을 등록합니다.</p></div>
              <div class="flex items-start gap-2"><span class="w-5 h-5 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center flex-shrink-0 text-[10px] font-bold mt-0.5">2</span><p>스케줄을 추가하고 실행 주기와 대상 그룹을 선택합니다.</p></div>
              <div class="flex items-start gap-2"><span class="w-5 h-5 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center flex-shrink-0 text-[10px] font-bold mt-0.5">3</span><p>지정된 시간에 해당 그룹의 URL이 자동 분석됩니다.</p></div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Add Criteria Modal -->
  <div id="add-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 p-6 fade-in max-h-[80vh] overflow-y-auto">
      <h3 class="text-base font-bold text-slate-800 mb-4">기준 추가</h3>
      <input id="modal-name" type="text" placeholder="기준 이름" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-3 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      <label class="text-xs text-slate-500 mb-1 block">점검 규칙 타입</label>
      <select id="modal-rule-type" onchange="onRuleTypeChange()"
        class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-1 focus:ring-2 focus:ring-indigo-400 focus:outline-none"></select>
      <p id="modal-rule-desc" class="text-xs text-slate-400 mb-3"></p>
      <div id="modal-params" class="space-y-2 mb-4"></div>
      <label class="text-xs text-slate-500 mb-1 block">점수</label>
      <input id="modal-points" type="number" min="0" max="100" value="2" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-4 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      <div class="flex gap-3">
        <button onclick="confirmAddCriteria()" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-xl text-sm hover:opacity-90">추가</button>
        <button onclick="closeModal()" class="px-6 py-2.5 bg-slate-100 text-slate-600 font-semibold rounded-xl text-sm hover:bg-slate-200">취소</button>
      </div>
    </div>
  </div>

  <!-- Add Group Modal -->
  <div id="group-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-6 fade-in">
      <h3 class="text-base font-bold text-slate-800 mb-4">URL 그룹 추가</h3>
      <input id="grp-name" type="text" placeholder="그룹 이름 (예: 메인 페이지, 상품 페이지)"
        class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-3 focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        onkeydown="if(event.key==='Enter') confirmAddGroup()">
      <label class="text-xs text-slate-500 mb-1 block">URL 목록 (한 줄에 하나씩)</label>
      <textarea id="grp-urls" rows="5" placeholder="https://example.com&#10;https://example.com/products"
        class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-4 focus:ring-2 focus:ring-indigo-400 focus:outline-none resize-none"></textarea>
      <div class="flex gap-3">
        <button onclick="confirmAddGroup()" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-xl text-sm hover:opacity-90">추가</button>
        <button onclick="document.getElementById('group-modal').classList.add('hidden')" class="px-6 py-2.5 bg-slate-100 text-slate-600 font-semibold rounded-xl text-sm hover:bg-slate-200">취소</button>
      </div>
    </div>
  </div>

  <!-- Add URL to Group Modal -->
  <div id="url-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-6 fade-in">
      <h3 class="text-base font-bold text-slate-800 mb-4">URL 추가</h3>
      <input id="url-modal-input" type="url" placeholder="https://example.com"
        class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-4 focus:ring-2 focus:ring-indigo-400 focus:outline-none"
        onkeydown="if(event.key==='Enter') confirmAddUrl()">
      <div class="flex gap-3">
        <button onclick="confirmAddUrl()" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-xl text-sm hover:opacity-90">추가</button>
        <button onclick="document.getElementById('url-modal').classList.add('hidden')" class="px-6 py-2.5 bg-slate-100 text-slate-600 font-semibold rounded-xl text-sm hover:bg-slate-200">취소</button>
      </div>
    </div>
  </div>

  <!-- Add Schedule Modal -->
  <div id="schedule-modal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-6 fade-in">
      <h3 class="text-base font-bold text-slate-800 mb-4">정기 Audit 스케줄 추가</h3>
      <input id="sched-name" type="text" placeholder="스케줄 이름"
        class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-3 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      <label class="text-xs text-slate-500 mb-1 block">대상 그룹</label>
      <select id="sched-group" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-3"></select>
      <label class="text-xs text-slate-500 mb-1 block">실행 주기</label>
      <select id="sched-freq" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-3">
        <option value="daily">매일</option>
        <option value="weekly">매주</option>
        <option value="monthly">매월</option>
      </select>
      <label class="text-xs text-slate-500 mb-1 block">실행 시간</label>
      <input id="sched-time" type="time" value="09:00"
        class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm mb-4 focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      <div class="flex gap-3">
        <button onclick="confirmAddSchedule()" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold rounded-xl text-sm hover:opacity-90">추가</button>
        <button onclick="document.getElementById('schedule-modal').classList.add('hidden')" class="px-6 py-2.5 bg-slate-100 text-slate-600 font-semibold rounded-xl text-sm hover:bg-slate-200">취소</button>
      </div>
    </div>
  </div>

<script>
let token = '';
let config = {};
let ruleTypes = {};
let dirty = false;
let modalCatKey = '';
let auditData = { groups: [], schedules: [] };
let currentPage = 'criteria';
let urlModalGroupIdx = -1;

const CAT_KEYS = ['seo_tags','robots_txt','json_ld','llms_txt','faq','summary_box','heading_structure','stats_density','reviews_ssr','csr_ratio'];
const CAT_COLORS = [
  'bg-indigo-500','bg-purple-500','bg-blue-500','bg-cyan-500','bg-teal-500',
  'bg-emerald-500','bg-amber-500','bg-orange-500','bg-rose-500','bg-pink-500'
];

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

// ── Navigation ──
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${page}`).classList.add('active');

  document.getElementById('page-criteria').classList.toggle('hidden', page !== 'criteria');
  document.getElementById('page-list').classList.toggle('hidden', page !== 'list');
  document.getElementById('page-schedule').classList.toggle('hidden', page !== 'schedule');

  if (page === 'list') renderGroups();
  if (page === 'schedule') renderSchedules();
}

// ── Login ──
async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  try {
    const res = await fetch('/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) { const d = await res.json(); errEl.textContent = d.detail||'실패'; errEl.classList.remove('hidden'); return; }
    token = pw;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-layout').style.display = 'flex';
    await Promise.all([loadConfig(), loadRuleTypes(), loadAuditData()]);
  } catch { errEl.textContent = '서버 연결 실패'; errEl.classList.remove('hidden'); }
}

function logout() {
  token = ''; config = {};
  document.getElementById('main-layout').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('pw-input').value = '';
}

async function loadConfig() {
  const res = await fetch('/admin/config', { headers: { 'Authorization': `Bearer ${token}` } });
  config = await res.json();
  renderCriteriaPage();
  dirty = false;
  document.getElementById('btn-save').disabled = true;
}

async function loadRuleTypes() {
  const res = await fetch('/admin/rule-types', { headers: { 'Authorization': `Bearer ${token}` } });
  ruleTypes = await res.json();
}

async function loadAuditData() {
  const res = await fetch('/admin/audit-data', { headers: { 'Authorization': `Bearer ${token}` } });
  auditData = await res.json();
  if (!auditData.groups) auditData.groups = [];
  if (!auditData.schedules) auditData.schedules = [];
}

async function saveAuditData() {
  await fetch('/admin/audit-data', {
    method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify(auditData),
  });
}

// ═══════════════════════════════════════════════════════════════════════
// Page 1: Audit 기준 설정
// ═══════════════════════════════════════════════════════════════════════

function renderCriteriaPage() {
  renderCards();
  updateTotal();
  renderProportionBar();
  document.getElementById('grade-good').value = config.grade?.good ?? 90;
  document.getElementById('grade-need').value = config.grade?.need_improvement ?? 70;
}

function renderProportionBar() {
  const bar = document.getElementById('proportion-bar');
  const legend = document.getElementById('proportion-legend');
  const total = CAT_KEYS.reduce((s, k) => s + (config[k]?.max || 0), 0) || 1;
  bar.innerHTML = ''; legend.innerHTML = '';
  CAT_KEYS.forEach((k, i) => {
    const c = config[k] || {};
    const pct = ((c.max || 0) / total * 100).toFixed(1);
    bar.innerHTML += `<div class="proportion-seg ${CAT_COLORS[i]} opacity-80 hover:opacity-100 cursor-default" style="width:${pct}%" title="${escHtml(c.label||k)}: ${c.max||0}점 (${pct}%)"></div>`;
    legend.innerHTML += `<span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm ${CAT_COLORS[i]} inline-block"></span>${escHtml(c.label||k)} ${c.max||0}</span>`;
  });
}

function renderCards() {
  const container = document.getElementById('config-cards');
  container.innerHTML = '';
  CAT_KEYS.forEach((catKey, catIdx) => {
    const c = config[catKey] || {};
    const label = c.label || catKey;
    const desc = c.description || '';
    const criteria = c.criteria || [];
    const crSum = criteria.filter(cr => cr.enabled !== false).reduce((s, cr) => s + (cr.points || 0), 0);
    const maxVal = c.max || 0;
    const isSpecial = !!c.special;

    let criteriaHtml = '';
    criteria.forEach((cr, idx) => {

}

function renderRuleParams(catKey, idx, ruleType, params) {
  if (!params || Object.keys(params).length === 0) return '';
  const rtMeta = ruleTypes[ruleType] || {};
  const paramDefs = rtMeta.params || {};
  let html = '';
  for (const [key, val] of Object.entries(params)) {
    const pDef = paramDefs[key] || {};
    const label = pDef.label || key;
    const type = pDef.type || 'text';
    if (type === 'select') {
      const options = (pDef.options || []).map(o => `<option value="${escHtml(o)}" ${o === String(val) ? 'selected' : ''}>${escHtml(o)}</option>`).join('');
      html += `<div><label class="text-[10px] text-slate-400 block mb-0.5">${escHtml(label)}</label><select class="px-2 py-1 rounded border border-slate-200 text-xs" onchange="setRuleParam('${catKey}', ${idx}, '${key}', this.value)">${options}</select></div>`;
    } else if (type === 'number') {
      const step = key.includes('ratio') ? '0.05' : '1';
      html += `<div><label class="text-[10px] text-slate-400 block mb-0.5">${escHtml(label)}</label><input type="number" step="${step}" value="${val}" class="w-20 px-2 py-1 rounded border border-slate-200 text-xs text-center" onchange="setRuleParam('${catKey}', ${idx}, '${key}', this.value)"></div>`;
    } else {
      html += `<div class="flex-1 min-w-[150px]"><label class="text-[10px] text-slate-400 block mb-0.5">${escHtml(label)}</label><input type="text" value="${escHtml(String(val))}" class="w-full px-2 py-1 rounded border border-slate-200 text-xs" onchange="setRuleParam('${catKey}', ${idx}, '${key}', this.value)"></div>`;
    }
  }
  return html;
}

function setMax(catKey, val) {
  val = parseInt(val) || 0;
  if (!config[catKey]) config[catKey] = {};
  config[catKey].max = val;
  const card = document.getElementById(`card-${catKey}`);
  if (card) { card.querySelector('input[type=range]').value = val; card.querySelector('input[type=number]').value = val; }
  markDirty(); updateTotal(); renderProportionBar();
}
function toggleCriteria(k, i) { const cr = config[k]?.criteria?.[i]; if (!cr) return; cr.enabled = !cr.enabled; markDirty(); renderCriteriaPage(); }
function setCriteriaPoints(k, i, v) { const cr = config[k]?.criteria?.[i]; if (!cr) return; cr.points = parseInt(v)||0; markDirty(); renderCriteriaPage(); }
function setRuleParam(k, i, key, val) { const cr = config[k]?.criteria?.[i]; if (!cr?.rule?.params) return; const n = Number(val); cr.rule.params[key] = (val !== '' && !isNaN(n) && !val.includes(',')) ? n : val; markDirty(); }
function deleteCriteria(k, i) { if (!confirm('이 기준을 삭제하시겠습니까?')) return; config[k].criteria.splice(i, 1); markDirty(); renderCriteriaPage(); }

function openAddModal(catKey) {
  modalCatKey = catKey;
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-points').value = '2';
  const select = document.getElementById('modal-rule-type');
  select.innerHTML = '';
  for (const [key, meta] of Object.entries(ruleTypes)) select.innerHTML += `<option value="${escHtml(key)}">${escHtml(meta.label)} (${escHtml(key)})</option>`;
  onRuleTypeChange();
  document.getElementById('add-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('add-modal').classList.add('hidden'); }
function onRuleTypeChange() {
  const type = document.getElementById('modal-rule-type').value;
  const meta = ruleTypes[type] || {};
  document.getElementById('modal-rule-desc').textContent = meta.description || '';
  const container = document.getElementById('modal-params');
  container.innerHTML = '';
  for (const [key, pDef] of Object.entries(meta.params || {})) {
    const t = pDef.type || 'text';
    let inp;
    if (t === 'select') { const opts = (pDef.options||[]).map(o => `<option value="${escHtml(o)}">${escHtml(o)}</option>`).join(''); inp = `<select id="mp-${key}" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm">${opts}</select>`; }
    else if (t === 'number') { inp = `<input id="mp-${key}" type="number" placeholder="${escHtml(pDef.placeholder||'')}" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm">`; }
    else { inp = `<input id="mp-${key}" type="text" placeholder="${escHtml(pDef.placeholder||'')}" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm">`; }
    container.innerHTML += `<div><label class="text-xs text-slate-500 mb-1 block">${escHtml(pDef.label || key)}</label>${inp}</div>`;
  }
}
function confirmAddCriteria() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { alert('기준 이름을 입력하세요.'); return; }
  const ruleType = document.getElementById('modal-rule-type').value;
  const meta = ruleTypes[ruleType] || {};
  const points = parseInt(document.getElementById('modal-points').value) || 0;
  const params = {};
  for (const key of Object.keys(meta.params || {})) { const el = document.getElementById(`mp-${key}`); if (el) { const v = el.value; const n = Number(v); params[key] = (v !== '' && !isNaN(n) && !v.includes(',')) ? n : v; } }
  const id = name.toLowerCase().replace(/[^a-z0-9가-힣]/g, '_').replace(/_+/g, '_');
  if (!config[modalCatKey]) config[modalCatKey] = {};
  if (!config[modalCatKey].criteria) config[modalCatKey].criteria = [];
  config[modalCatKey].criteria.push({ id, name, points, enabled: true, rule: { type: ruleType, params } });
  closeModal(); markDirty(); renderCriteriaPage();
}
function autoBalance() { for (const k of CAT_KEYS) { const c = config[k]; if (!c?.criteria) continue; c.max = c.criteria.filter(cr => cr.enabled !== false).reduce((s, cr) => s + (cr.points || 0), 0); } markDirty(); renderCriteriaPage(); showToast('자동 맞춤 완료'); }
function markDirty() { if (!config.grade) config.grade = {}; config.grade.good = parseInt(document.getElementById('grade-good').value)||90; config.grade.need_improvement = parseInt(document.getElementById('grade-need').value)||70; dirty = true; document.getElementById('btn-save').disabled = false; }
function updateTotal() { let t = 0; for (const k of CAT_KEYS) t += (config[k]?.max || 0); document.getElementById('total-badge').textContent = `${t}점`; const w = document.getElementById('total-warning'); if (t !== 100) { w.textContent = `총점이 ${t}점입니다. 100점이 권장됩니다.`; w.classList.remove('hidden'); } else { w.classList.add('hidden'); } }

async function saveConfig() {
  try {
    const res = await fetch('/admin/config', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(config) });
    if (!res.ok) { alert('저장 실패'); return; }
    const data = await res.json(); config = data.config;
    renderCriteriaPage(); dirty = false; document.getElementById('btn-save').disabled = true; showToast('설정이 저장되었습니다.');
  } catch { alert('서버 연결 실패'); }
}
async function resetConfig() {
  if (!confirm('모든 설정을 기본값으로 되돌리시겠습니까?')) return;
  try {
    const res = await fetch('/admin/config/reset', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
    if (!res.ok) { alert('리셋 실패'); return; }
    const data = await res.json(); config = data.config;
    renderCriteriaPage(); dirty = false; document.getElementById('btn-save').disabled = true; showToast('기본값으로 복원');
  } catch { alert('서버 연결 실패'); }
}

function openAddGroupModal() {
  document.getElementById('grp-name').value = '';
  document.getElementById('grp-urls').value = '';
  document.getElementById('group-modal').classList.remove('hidden');
}

async function confirmAddGroup() {
  const name = document.getElementById('grp-name').value.trim();
  if (!name) { alert('그룹 이름을 입력하세요.'); return; }
  const urlsText = document.getElementById('grp-urls').value.trim();
  const urls = urlsText ? urlsText.split('\n').map(u => u.trim()).filter(u => u).map(url => ({ url, lastScore: null, lastRun: null })) : [];
  auditData.groups.push({ name, urls });
  await saveAuditData(); renderGroups();
  document.getElementById('group-modal').classList.add('hidden');
  showToast(`"${name}" 그룹이 추가되었습니다.`);
}

function openAddUrlToGroup(gi) {
  urlModalGroupIdx = gi;
  document.getElementById('url-modal-input').value = '';
  document.getElementById('url-modal').classList.remove('hidden');
}

async function confirmAddUrl() {
  const url = document.getElementById('url-modal-input').value.trim();
  if (!url || urlModalGroupIdx < 0) return;
  auditData.groups[urlModalGroupIdx].urls.push({ url, lastScore: null, lastRun: null });
  await saveAuditData(); renderGroups();
  document.getElementById('url-modal').classList.add('hidden');
  showToast('URL이 추가되었습니다.');
}

async function removeUrl(gi, ui) {
  if (!confirm('이 URL을 삭제하시겠습니까?')) return;
  auditData.groups[gi].urls.splice(ui, 1);
  await saveAuditData(); renderGroups();
}

async function removeGroup(gi) {
  const g = auditData.groups[gi];
  if (!confirm(`"${g.name}" 그룹을 삭제하시겠습니까?`)) return;
  auditData.groups.splice(gi, 1);
  await saveAuditData(); renderGroups();
  showToast('그룹이 삭제되었습니다.');
}

async function runAudit(gi, ui) {
  const u = auditData.groups[gi]?.urls[ui];
  if (!u) return;
  showToast(`분석 중: ${u.url}`);
  try {
    const res = await fetch('/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: u.url }) });
    if (!res.ok) { showToast('분석 실패'); return; }
    const data = await res.json();
    u.lastScore = data.score?.total ?? null;
    u.lastRun = new Date().toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    await saveAuditData(); renderGroups();
    showToast(`${u.url}: ${u.lastScore}점`);
  } catch { showToast('분석 중 오류 발생'); }
}

async function runGroupAudit(gi) {
  const g = auditData.groups[gi];
  if (!g?.urls.length) { showToast('URL이 없습니다.'); return; }
  showToast(`"${g.name}" 전체 분석 시작 (${g.urls.length}개)...`);
  for (let ui = 0; ui < g.urls.length; ui++) {
    await runAudit(gi, ui);
  }
  showToast(`"${g.name}" 전체 분석 완료`);
}

async function confirmAddSchedule() {
  const name = document.getElementById('sched-name').value.trim();
  if (!name) { alert('스케줄 이름을 입력하세요.'); return; }
  const groupIdx = document.getElementById('sched-group').value;
  if (groupIdx === '' || groupIdx == null) { alert('대상 그룹을 선택하세요.'); return; }
  auditData.schedules.push({
    name,
    groupIdx: parseInt(groupIdx),
    freq: document.getElementById('sched-freq').value,
    time: document.getElementById('sched-time').value,
    enabled: true,
  });
  await saveAuditData(); renderSchedules();
  document.getElementById('schedule-modal').classList.add('hidden');
  showToast('스케줄이 추가되었습니다.');
}

async function toggleSchedule(i) {
  auditData.schedules[i].enabled = !auditData.schedules[i].enabled;
  await saveAuditData(); renderSchedules();
}

async function removeSchedule(i) {
  if (!confirm('이 스케줄을 삭제하시겠습니까?')) return;
  auditData.schedules.splice(i, 1);
  await saveAuditData(); renderSchedules();
}

// ── Toast ──
function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-sm px-5 py-3 rounded-xl shadow-lg fade-in z-50';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}
